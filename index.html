<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>you know i like you right</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --bg: #1a1420;
    --bubble-them: #2b2438;
    --bubble-me: #ff5d8f;
    --text-light: #f5eef2;
    --accent: #ffb800;
    --dim: #9d8fa8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background: radial-gradient(circle at 50% 0%, #2a1f33 0%, #16101c 70%);
    font-family: 'Segoe UI', system-ui, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .phone{
    width:420px;
    max-width:100%;
    background: var(--bg);
    border-radius:28px;
    border: 6px solid #0d0910;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.04);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    height:720px;
  }
  .topbar{
    padding:16px 18px 12px;
    display:flex;
    align-items:center;
    gap:12px;
    border-bottom:1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.02);
  }
  .avatar{
    width:38px;height:38px;border-radius:50%;
    background: linear-gradient(135deg, #ff5d8f, #ffb800);
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
  }
  .topbar .name{ font-weight:600; color:var(--text-light); font-size:15px; }
  .topbar .status{ font-size:11px; color: var(--dim); }
  .chat{
    flex:1;
    padding:20px 16px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .bubble{
    max-width:78%;
    padding:11px 15px;
    border-radius:18px;
    font-size:14.5px;
    line-height:1.4;
    animation: pop 0.25s ease;
    opacity:0;
    animation-fill-mode: forwards;
  }
  @keyframes pop{
    from{ transform: scale(0.85) translateY(6px); opacity:0; }
    to{ transform: scale(1) translateY(0); opacity:1; }
  }
  .them{
    background: var(--bubble-them);
    color: var(--text-light);
    align-self:flex-start;
    border-bottom-left-radius:5px;
  }
  .me{
    background: linear-gradient(135deg, #ff5d8f, #ff8a5c);
    color:white;
    align-self:flex-end;
    border-bottom-right-radius:5px;
  }
  .typing{
    align-self:flex-start;
    display:flex;
    gap:4px;
    padding:12px 16px;
    background: var(--bubble-them);
    border-radius:18px;
    border-bottom-left-radius:5px;
  }
  .typing span{
    width:6px;height:6px;border-radius:50%;
    background: var(--dim);
    animation: bounce 1.1s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay:0.15s; }
  .typing span:nth-child(3){ animation-delay:0.3s; }
  @keyframes bounce{
    0%,60%,100%{ transform: translateY(0); opacity:0.4;}
    30%{ transform: translateY(-5px); opacity:1;}
  }
  .options{
    padding:12px 16px 18px;
    display:flex;
    flex-direction:column;
    gap:8px;
    border-top:1px solid rgba(255,255,255,0.07);
    background: rgba(0,0,0,0.15);
  }
  .opt-btn{
    background: rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    color: var(--text-light);
    padding:10px 14px;
    border-radius:14px;
    font-size:13.5px;
    text-align:left;
    cursor:pointer;
    transition: all 0.15s ease;
  }
  .opt-btn:hover{
    background: rgba(255,93,143,0.18);
    border-color: rgba(255,93,143,0.5);
    transform: translateX(2px);
  }
  .opt-btn:active{ transform: scale(0.98); }
  .restart{
    text-align:center;
    padding:14px;
    color: var(--accent);
    font-size:13px;
    cursor:pointer;
    text-decoration:underline;
    display:none;
  }
  .heart-burst{
    position:fixed;
    pointer-events:none;
    font-size:22px;
    animation: floatUp 1.8s ease-out forwards;
    z-index:99;
  }
  @keyframes floatUp{
    0%{ transform: translateY(0) scale(0.6) rotate(0deg); opacity:1; }
    100%{ transform: translateY(-160px) scale(1.3) rotate(20deg); opacity:0; }
  }
</style>
</head>
<body>

<div class="phone">
  <div class="topbar">
    <div class="avatar">☀️</div>
    <div>
      <div class="name">sunshine ☀️</div>
      <div class="status" id="status">online • definitely not spiraling</div>
    </div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="options" id="options"></div>
  <div class="restart" id="restart" onclick="restart()">↻ run it back</div>
</div>

<script>
const chat = document.getElementById('chat');
const optionsBox = document.getElementById('options');
const statusEl = document.getElementById('status');
const restartBtn = document.getElementById('restart');

// Each node: them message(s), then options -> each option has a reply text + next node id
const script = {
  start: {
    them: ["hey", "quick question", "you know i like you right...? RIGHT??!"],
    options: [
      { text: "yes obviously, why", next: "yes1" },
      { text: "i mean... i had a feeling", next: "feeling1" },
      { text: "wait what's happening rn", next: "confused1" },
      { text: "lol no, who is this", next: "bad_ending" },
    ]
  },
  yes1: {
    them: ["ok good", "just checking", "because i thought about you 14 times today and i counted"],
    options: [
      { text: "that's... a lot", next: "escalate1" },
      { text: "only 14? couldn't be me", next: "cocky1" },
      { text: "ok that's a little much ngl", next: "bad_ending" },
    ]
  },
  feeling1: {
    them: ["a FEELING", "ok sherlock", "well you're right and it's a lot actually"],
    options: [
      { text: "how much is 'a lot'", next: "escalate1" },
      { text: "same tbh", next: "mutual1" },
      { text: "cool cool gonna go now", next: "bad_ending" },
    ]
  },
  confused1: {
    them: ["oh nothing", "i just may have looked at your instagram 6 times today", "for research purposes"],
    options: [
      { text: "research on what exactly", next: "escalate1" },
      { text: "i do the same thing lol", next: "mutual1" },
      { text: "ok i'm blocking you", next: "bad_ending" },
    ]
  },
  escalate1: {
    them: ["ok don't judge me", "but i also made a playlist", "it's called 'songs that remind me of you' and it has 47 songs", "47.", "i update it weekly"],
    options: [
      { text: "i need to hear this playlist immediately", next: "playlist" },
      { text: "this is a cry for help", next: "cryforhelp" },
    ]
  },
  cocky1: {
    them: ["oh you wanna talk numbers??", "i have a note on my phone titled 'things to tell him' with 23 entries", "i am UNWELL"],
    options: [
      { text: "read me all 23 rn", next: "cryforhelp" },
      { text: "i'm kind of into this", next: "mutual1" },
    ]
  },
  mutual1: {
    them: ["wait really??", "ok this is very good information", "because i was about to send you a 9 paragraph text and now i don't have to feel embarrassed about it"],
    options: [
      { text: "send the 9 paragraphs. i want them", next: "cryforhelp" },
      { text: "we are both so normal about this", next: "ending" },
    ]
  },
  playlist: {
    them: ["ok i'm not sending it", "it's classified", "just know track 12 is very specific to a memory involving you saying fuck"],
    options: [
      { text: "i remember that day", next: "ending" },
      { text: "you need therapy and i respect it", next: "ending" },
    ]
  },
  cryforhelp: {
    them: ["ok fine here's a preview:", "'1. he said he liked the way I put my nail on my lip while taking a pic'", "i'm going to stop there for both our sakes"],
    options: [
      { text: "i love that this is who you are", next: "ending" },
      { text: "we're getting matching straightjackets", next: "ending" },
    ]
  },
  ending: {
    them: ["ok real talk though 🥹", "i just really really like you", "like, obnoxiously, unreasonably, tell-my-friends-too-much amount", "so this is me confessing it properly:", "i like you. a lot. i'm not being normal about it and i don't care", "so yes. you know i like you. RIGHT. good. we're aligned. carry on 💕"],
    options: [],
    good: true
  },
  bad_ending: {
    them: ["oh", "ok wow", "cool cool cool", "😐", "deleting your number", "jk i saved it as 'do not text back'", "jk i already opened your chat 4 times since i said that", "anyway. i take it back. you actually don't know i like you. i like you SO much and i'm never recovering from this rejection", "see you at the wedding i already planned in my head 💀"],
    options: [],
    bad: true
  }
};

let currentNode = "start";

function typeDelay(len){
  return Math.min(1400, 400 + len * 22);
}

function addBubble(text, cls){
  return new Promise(resolve => {
    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';
    chat.appendChild(typing);
    chat.scrollTop = chat.scrollHeight;

    setTimeout(() => {
      typing.remove();
      const b = document.createElement('div');
      b.className = 'bubble ' + cls;
      b.textContent = text;
      chat.appendChild(b);
      chat.scrollTop = chat.scrollHeight;
      resolve();
    }, typeDelay(text.length));
  });
}

async function playThem(messages){
  statusEl.textContent = "typing...";
  for(const m of messages){
    await addBubble(m, 'them');
  }
  statusEl.textContent = "online • definitely not spiraling";
}

function showOptions(node){
  optionsBox.innerHTML = '';
  if(node.options.length === 0){
    restartBtn.style.display = 'block';
    if(node.bad){
      burstEmojis(['💔','😭','☠️','📉']);
      statusEl.textContent = "last seen just now, tragically";
    } else {
      burstEmojis(['💕','💗','✨','💌','🩷']);
      statusEl.textContent = "online • definitely not spiraling";
    }
    return;
  }
  node.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt.text;
    btn.onclick = () => choose(opt);
    optionsBox.appendChild(btn);
  });
}

async function choose(opt){
  optionsBox.innerHTML = '';
  await addBubble(opt.text, 'me');
  const node = script[opt.next];
  currentNode = opt.next;
  await playThem(node.them);
  showOptions(node);
}

async function runNode(nodeKey){
  const node = script[nodeKey];
  await playThem(node.them);
  showOptions(node);
}

function burstEmojis(emojiList){
  for(let i=0;i<14;i++){
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'heart-burst';
      h.textContent = emojiList[Math.floor(Math.random()*emojiList.length)];
      h.style.left = (20 + Math.random()*60) + '%';
      h.style.top = '70%';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1900);
    }, i * 120);
  }
}

function restart(){
  chat.innerHTML = '';
  optionsBox.innerHTML = '';
  restartBtn.style.display = 'none';
  currentNode = 'start';
  runNode('start');
}

runNode('start');
</script>

</body>
</html>
